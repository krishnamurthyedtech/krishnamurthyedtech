<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishnamurthy EdTech Pvt Ltd</title>
    <link rel="icon" type="image/jpeg" href="/KMED-logo.jpeg" sizes="192x192">
    <link rel="icon" type="image/jpeg" href="/KMED-logo.jpeg" sizes="512x512">
    <link rel="shortcut icon" href="/KMED-logo.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Manrope', 'sans-serif'],
            },
            colors: {
              brand: {
                primary: '#3B82F6',
                secondary: '#8B5CF6',
                accent: '#EC4899',
                dark: '#030303',
                card: 'rgba(10, 10, 10, 0.7)',
                border: 'rgba(255, 255, 255, 0.08)',
              }
            },
          }
        }
      }
    </script>
    <style>
      :root {
        --grid-color: rgba(255, 255, 255, 0.03);
      }
      body {
        background-color: #030303;
        background-image: 
          linear-gradient(var(--grid-color) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
        background-size: 40px 40px;
        color: #F8FAFC;
        overflow-x: hidden;
      }
      .glass-card {
        background: rgba(10, 10, 10, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
      }
      .text-gradient {
        background: linear-gradient(135deg, #fff 0%, #3B82F6 50%, #8B5CF6 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        background-size: 200% auto;
      }
      .border-beam {
        position: relative;
        overflow: hidden;
      }
      .border-beam::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: conic-gradient(from 0deg, transparent 70%, #3B82F6 85%, transparent 100%);
        animation: rotate 4s linear infinite;
        z-index: -1;
        opacity: 0.4;
      }
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .mesh-gradient {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: 
          radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0, transparent 50%),
          radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0, transparent 50%),
          radial-gradient(at 50% 100%, rgba(236, 72, 153, 0.1) 0, transparent 50%);
        pointer-events: none;
        z-index: -1;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #030303; }
      ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #333; }
      
      /* Logo fixes */
      .navbar-logo {
        flex-shrink: 0 !important;
        min-width: fit-content !important;
        width: auto !important;
        max-width: none !important;
        overflow: visible !important;
      }
      .logo-text {
        overflow: visible !important;
        min-width: fit-content !important;
        width: auto !important;
        max-width: none !important;
        flex-shrink: 0 !important;
      }
      .logo-text span {
        overflow: visible !important;
        white-space: nowrap !important;
        display: inline-block !important;
        width: auto !important;
        max-width: none !important;
        letter-spacing: normal !important;
      }
      @media (max-width: 640px) {
        .navbar-logo {
          flex-shrink: 0 !important;
          min-width: fit-content !important;
          width: auto !important;
          max-width: none !important;
          padding-left: 1rem !important;
          overflow: visible !important;
        }
        .logo-text {
          overflow: visible !important;
          min-width: fit-content !important;
          width: auto !important;
          max-width: none !important;
          flex-shrink: 0 !important;
        }
        .logo-text span {
          overflow: visible !important;
          white-space: nowrap !important;
          display: inline-block !important;
          width: auto !important;
          max-width: none !important;
          letter-spacing: normal !important;
        }
      }
      @media (max-width: 480px) {
        .navbar-logo {
          flex-shrink: 0 !important;
          min-width: fit-content !important;
          width: auto !important;
          max-width: none !important;
          padding-left: 1rem !important;
          overflow: visible !important;
        }
        .logo-text {
          overflow: visible !important;
          min-width: fit-content !important;
          width: auto !important;
          max-width: none !important;
          flex-shrink: 0 !important;
        }
        .logo-text span {
          overflow: visible !important;
          white-space: nowrap !important;
          display: inline-block !important;
          width: auto !important;
          max-width: none !important;
          letter-spacing: normal !important;
        }
      }
    </style>

<!-- Removed stale /index.css link; styles are inlined via Tailwind config/script -->
  <script type="module" src="/index.tsx"></script>
</head>
<body>
    <div class="mesh-gradient"></div>
    <div id="root"></div>
</body>
</html>
